<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPV Race Awards Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 950 */
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
    </style>
</head>
<body class="antialiased p-6 md:p-12">

    <!-- Header & Upload Section -->
    <div class="max-w-7xl mx-auto mb-12 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400">
            Race Results & Awards
        </h1>
        <p class="text-slate-400 mb-8 max-w-2xl mx-auto">Upload the race CSV export to generate podiums based on overall performance and specialized efficiency metrics.</p>
        
        <div class="inline-block relative">
            <input type="file" id="csvFileInput" accept=".csv" class="hidden">
            <label for="csvFileInput" class="cursor-pointer inline-flex items-center px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-full shadow-lg transition-colors duration-300">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                </svg>
                Upload Results CSV
            </label>
        </div>

        <!-- Bot Toggle -->
        <div class="mt-6 flex items-center justify-center space-x-3 hidden" id="toggleContainer">
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="includeBotsToggle" class="sr-only peer">
                <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-500"></div>
                <span class="ml-3 text-sm font-medium text-slate-300">Include Bots</span>
            </label>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="hidden max-w-7xl mx-auto pb-20">
        <div class="flex items-center space-x-3 mb-8">
            <h2 class="text-3xl font-bold text-white">Race Awards Podiums</h2>
            <div class="h-px bg-slate-700 flex-grow"></div>
        </div>
        <div id="general-podiums" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Dynamically populated -->
        </div>
    </div>

    <script>
        let rawData = [];

        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    rawData = results.data;
                    document.getElementById('toggleContainer').classList.remove('hidden');
                    renderDashboard();
                }
            });
        });

        document.getElementById('includeBotsToggle').addEventListener('change', function() {
            if (rawData.length > 0) renderDashboard();
        });

        function generatePodiumHTML(title, rankData) {
            const first = rankData[0];
            const second = rankData[1];
            const third = rankData[2];

            const renderBlock = (person, rank) => {
                if (!person) {
                    return `<div class="flex flex-col items-center justify-end w-1/3 opacity-10 h-full">
                                <div class="w-full h-${rank === 2 ? '24' : '16'} bg-slate-800 rounded-t-lg"></div>
                            </div>`;
                }

                let height, color, bg, border;
                if (rank === 1) {
                    height = 'h-32'; color = 'text-yellow-400'; bg = 'bg-yellow-500/20'; border = 'border-yellow-400';
                } else if (rank === 2) {
                    height = 'h-24'; color = 'text-slate-300'; bg = 'bg-slate-400/20'; border = 'border-slate-300';
                } else {
                    height = 'h-16'; color = 'text-amber-600'; bg = 'bg-amber-700/20'; border = 'border-amber-600';
                }

                return `
                    <div class="flex flex-col items-center justify-end w-1/3 z-10 group h-full">
                        <div class="mb-1 text-center w-full px-1 flex flex-col justify-end transition-transform duration-300 group-hover:-translate-y-1">
                            <div class="font-bold text-[11px] sm:text-xs text-white leading-tight mb-0.5" style="word-wrap: break-word;">${person.name}</div>
                            ${person.value ? `<div class="text-[9px] sm:text-[10px] text-slate-400 font-mono leading-none">${person.value}</div>` : ''}
                        </div>
                        <div class="w-full ${height} ${bg} border-t-4 ${border} rounded-t-lg flex items-center justify-center text-3xl font-black ${color} opacity-90 shadow-[0_-5px_15px_rgba(0,0,0,0.2)]">
                            ${rank}
                        </div>
                    </div>
                `;
            };

            return `
                <div class="glass-card p-4 sm:p-5 rounded-2xl flex flex-col h-[20rem]">
                    <h3 class="text-base sm:text-lg font-bold mb-0 text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-emerald-300 uppercase tracking-wider">${title}</h3>
                    <div class="flex-grow flex items-end justify-center space-x-1 sm:space-x-2">
                        ${renderBlock(second, 2)}
                        ${renderBlock(first, 1)}
                        ${renderBlock(third, 3)}
                    </div>
                </div>
            `;
        }

        function renderDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            const includeBots = document.getElementById('includeBotsToggle').checked;

            const validRiders = rawData.filter(row => {
                const time = parseInt(row.time);
                if (!time || time <= 0) return false;
                if (String(row.isDNF).toLowerCase() === 'true') return false;
                if (!includeBots && String(row.isBot).toLowerCase() === 'true') return false;
                return true;
            });
            
            const parsedRiders = validRiders.map(r => ({
                ...r,
                timeSec: parseInt(r.time) / 1000,
                timeMs: parseInt(r.time),
                avgPower: parseInt(r.avgPower) || 0,
                maxPower: parseInt(r.maxPower) || 0,
                rating: parseFloat(r.rating) || 0,
                age: parseInt(r.ageBand) || 0,
                gender: parseInt(r.gender) || 0,
                fullName: `${r.firstName} ${r.lastName}`.trim() || 'Unknown Rider',
                team: (r.teamName || '').trim(),
                kj: (parseInt(r.avgPower) * (parseInt(r.time) / 1000)) / 1000,
                position: parseInt(r.position) || 999
            }));

            let podiumsHTML = '';

            // 1. Overall
            const topOverall = [...parsedRiders].sort((a, b) => a.position - b.position).slice(0, 3).map(r => ({
                name: r.fullName, value: r.team
            }));
            if (topOverall.length > 0) podiumsHTML += generatePodiumHTML("Overall", topOverall);

            // 2. Detonator Podium (Max Power)
            const detonators = [...parsedRiders]
                .sort((a, b) => b.maxPower - a.maxPower)
                .slice(0, 3)
                .map(r => ({
                    name: r.fullName, value: `${r.maxPower}W Peak Power`
                }));
            if (detonators.length > 0) podiumsHTML += generatePodiumHTML("Detonator Podium", detonators);

            // 3. Efficiency Leaders
            const fieldSize = parsedRiders.length;
            const topQuarterThreshold = Math.max(3, Math.ceil(fieldSize * 0.25));
            const efficiency = [...parsedRiders]
                .sort((a, b) => a.position - b.position)
                .slice(0, topQuarterThreshold)
                .sort((a, b) => a.avgPower - b.avgPower)
                .slice(0, 3)
                .map(r => ({
                    name: r.fullName, value: `${r.avgPower}W / P${r.position}`
                }));
            if (efficiency.length > 0) podiumsHTML += generatePodiumHTML("Efficiency Leaders", efficiency);

            // 4. Overachiever
            const sortedByRating = [...parsedRiders].sort((a, b) => b.rating - a.rating);
            const overachievers = parsedRiders.map(r => {
                const expectedRank = sortedByRating.findIndex(s => s.playerId === r.playerId) + 1;
                const gain = expectedRank - r.position;
                return { ...r, gain };
            }).sort((a, b) => b.gain - a.gain).slice(0, 3).map(r => ({
                name: r.fullName, value: `+${r.gain} spots gain`
            }));
            if (overachievers.length > 0) podiumsHTML += generatePodiumHTML("Overachiever", overachievers);

            // 5. Workhorses
            const workhorses = [...parsedRiders].sort((a, b) => b.kj - a.kj).slice(0, 3).map(r => ({
                name: r.fullName, value: `${Math.round(r.kj)} kJ`
            }));
            if (workhorses.length > 0) podiumsHTML += generatePodiumHTML("Workhorses", workhorses);

            // 6. Women Podium
            const women = [...parsedRiders]
                .filter(r => r.gender === 1)
                .sort((a, b) => a.position - b.position)
                .slice(0, 3)
                .map(r => ({
                    name: r.fullName, value: r.team || `Rank #${r.position}`
                }));
            if (women.length > 0) podiumsHTML += generatePodiumHTML("Women's Podium", women);

            // 7. Age Groups
            const groups = [
                { name: "+40 Age Group", filter: r => r.age >= 40 && r.age < 50 },
                { name: "+50 Age Group", filter: r => r.age >= 50 && r.age < 60 },
                { name: "+60 Age Group", filter: r => r.age >= 60 }
            ];

            groups.forEach(g => {
                const data = [...parsedRiders].filter(g.filter).sort((a, b) => a.position - b.position).slice(0, 3).map(r => ({
                    name: r.fullName, value: r.team
                }));
                if (data.length > 0) podiumsHTML += generatePodiumHTML(g.name, data);
            });

            // 8. Teams Podium
            const teamsMap = {};
            parsedRiders.forEach(r => {
                if (r.team && r.team.length > 0) {
                    if (!teamsMap[r.team]) teamsMap[r.team] = [];
                    teamsMap[r.team].push(r.position);
                }
            });

            const teamScores = Object.entries(teamsMap).map(([teamName, positions]) => {
                const sortedPos = positions.sort((a, b) => a - b);
                let score = 0;
                for (let i = 0; i < 3; i++) {
                    if (sortedPos[i] !== undefined) {
                        score += sortedPos[i];
                    } else {
                        score += 40;
                    }
                }
                return { name: teamName, score, count: positions.length };
            });

            const topTeams = teamScores
                .sort((a, b) => a.score - b.score)
                .slice(0, 3)
                .map(t => ({
                    name: t.name, value: `${t.score} pts (${t.count} riders)`
                }));
            
            if (topTeams.length > 0) podiumsHTML += generatePodiumHTML("Top Teams", topTeams);

            document.getElementById('general-podiums').innerHTML = podiumsHTML;
            document.getElementById('dashboard').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
